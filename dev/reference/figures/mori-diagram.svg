<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 310" font-family="system-ui, -apple-system, sans-serif" font-size="14">
  <!-- Shared Memory box -->
  <rect x="250" y="20" width="220" height="60" rx="10" fill="#e8f0fe" stroke="#4a7cbf" stroke-width="1.5"/>
  <text x="360" y="46" text-anchor="middle" font-weight="600" fill="#1a3a5c">Shared Memory</text>
  <text x="360" y="66" text-anchor="middle" fill="#4a7cbf" font-size="12">(OS-backed)</text>

  <!-- create() label and arrow -->
  <text x="140" y="44" text-anchor="middle" font-size="11" fill="#888">share(obj)</text>
  <text x="140" y="62" text-anchor="middle" font-size="11" fill="#888">write once</text>
  <line x1="200" y1="48" x2="244" y2="48" stroke="#4a7cbf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- mmap connector: trunk, crossbar, and 4 prongs -->
  <line x1="360" y1="80" x2="360" y2="140" stroke="#4a7cbf" stroke-width="1.2"/>
  <line x1="100" y1="140" x2="620" y2="140" stroke="#4a7cbf" stroke-width="1.2"/>
  <line x1="100" y1="140" x2="100" y2="198" stroke="#4a7cbf" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="273" y1="140" x2="273" y2="198" stroke="#4a7cbf" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="447" y1="140" x2="447" y2="198" stroke="#4a7cbf" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="620" y1="140" x2="620" y2="198" stroke="#4a7cbf" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- mmap label -->
  <text x="384" y="130" text-anchor="start" fill="#888" font-size="11">mmap</text>

  <!-- Process boxes -->
  <rect x="40" y="202" width="120" height="34" rx="8" fill="#f0f4e8" stroke="#6a9a3a" stroke-width="1.2"/>
  <text x="100" y="224" text-anchor="middle" fill="#3a5c1a" font-size="13">Process 1</text>

  <rect x="213" y="202" width="120" height="34" rx="8" fill="#f0f4e8" stroke="#6a9a3a" stroke-width="1.2"/>
  <text x="273" y="224" text-anchor="middle" fill="#3a5c1a" font-size="13">Process 2</text>

  <rect x="387" y="202" width="120" height="34" rx="8" fill="#f0f4e8" stroke="#6a9a3a" stroke-width="1.2"/>
  <text x="447" y="224" text-anchor="middle" fill="#3a5c1a" font-size="13">Process 3</text>

  <rect x="560" y="202" width="120" height="34" rx="8" fill="#f0f4e8" stroke="#6a9a3a" stroke-width="1.2"/>
  <text x="620" y="224" text-anchor="middle" fill="#3a5c1a" font-size="13">Process 4</text>

  <!-- Subtitle -->
  <text x="360" y="270" text-anchor="middle" fill="#888" font-size="12" font-style="italic">ALTREP wrappers — zero-copy reads</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a7cbf"/>
    </marker>
  </defs>
</svg>
