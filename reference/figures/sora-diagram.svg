<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -8 400 200" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <!-- Shared Memory box -->
  <rect x="115" y="8" width="170" height="48" rx="8" fill="#e8f0fe" stroke="#4a7cbf" stroke-width="1.5"/>
  <text x="200" y="30" text-anchor="middle" font-weight="600" fill="#1a3a5c">Shared Memory</text>
  <text x="200" y="46" text-anchor="middle" fill="#4a7cbf" font-size="11">(OS-backed)</text>

  <!-- create() label and arrow -->
  <text x="52" y="32" text-anchor="middle" font-size="12" fill="#1a3a5c" font-weight="600">sora(obj)</text>
  <text x="52" y="47" text-anchor="middle" font-size="10" fill="#888">write once</text>
  <line x1="95" y1="32" x2="110" y2="32" stroke="#4a7cbf" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- mmap arrows from SHM to processes -->
  <line x1="155" y1="56" x2="56" y2="122" stroke="#4a7cbf" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="180" y1="56" x2="152" y2="122" stroke="#4a7cbf" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="220" y1="56" x2="248" y2="122" stroke="#4a7cbf" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="245" y1="56" x2="344" y2="122" stroke="#4a7cbf" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- mmap labels -->
  <text x="105" y="90" text-anchor="middle" fill="#888" font-size="10">mmap</text>
  <text x="295" y="90" text-anchor="middle" fill="#888" font-size="10">mmap</text>

  <!-- Process boxes -->
  <rect x="16" y="126" width="80" height="26" rx="6" fill="#f0f4e8" stroke="#6a9a3a" stroke-width="1.2"/>
  <text x="56" y="143" text-anchor="middle" fill="#3a5c1a" font-size="12">Process 1</text>

  <rect x="112" y="126" width="80" height="26" rx="6" fill="#f0f4e8" stroke="#6a9a3a" stroke-width="1.2"/>
  <text x="152" y="143" text-anchor="middle" fill="#3a5c1a" font-size="12">Process 2</text>

  <rect x="208" y="126" width="80" height="26" rx="6" fill="#f0f4e8" stroke="#6a9a3a" stroke-width="1.2"/>
  <text x="248" y="143" text-anchor="middle" fill="#3a5c1a" font-size="12">Process 3</text>

  <rect x="304" y="126" width="80" height="26" rx="6" fill="#f0f4e8" stroke="#6a9a3a" stroke-width="1.2"/>
  <text x="344" y="143" text-anchor="middle" fill="#3a5c1a" font-size="12">Process 4</text>

  <!-- Subtitle -->
  <text x="200" y="174" text-anchor="middle" fill="#888" font-size="11" font-style="italic">ALTREP wrappers — zero-copy reads</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a7cbf"/>
    </marker>
  </defs>
</svg>
